/* ─── GABI AI ENGINE ─── */
const getGabiAdvice = (aliado, role, msgs) => {
  const last = [...msgs].reverse().find(m => m.from === 'them');
  const lastText = last?.text?.toLowerCase() || '';
  const sent  = aliado.sentimiento;
  const status = aliado.status;

  if (role === 'Inside Sales') {
    // Objection: price / commission
    if (lastText.includes('comisión') || lastText.includes('costo') || lastText.includes('precio')) {
      return {
        situacion: `${aliado.name} tiene objeción sobre costos. Este es un momento clave — no cedas en el precio, ancla en el valor.`,
        acciones: [
          { icon:'💡', text:'Presenta el ROI concreto: ventas adicionales estimadas vs costo de comisión' },
          { icon:'📊', text:'Usa datos de restaurantes similares de su zona como referencia' },
          { icon:'🎁', text:'Ofrece el beneficio de visibilidad premium el primer mes sin costo' },
        ],
        mensaje: `Entiendo la preocupación. Pensemos en términos de ROI: con solo 10 pedidos adicionales al día a $35.000 ticket promedio, generarías $10.5M al mes. La comisión sería $1.89M, ganancia neta incremental de $8.6M. ¿Vale la pena?`,
      };
    }
    // Question about logistics / process
    if (lastText.includes('cómo') || lastText.includes('como') || lastText.includes('qué necesitan') || lastText.includes('proceso')) {
      return {
        situacion: `${aliado.name} está preguntando por el proceso. Están evaluando activamente — esta es la señal para cerrar el siguiente paso concreto.`,
        acciones: [
          { icon:'📋', text:'Lista los 3 documentos necesarios de forma simple y sin fricción' },
          { icon:'⏱️', text:'Da un tiempo estimado claro: "activamos en 48h con documentos"' },
          { icon:'🤝', text:'Propón una fecha concreta para el siguiente paso' },
        ],
        mensaje: `Para activar necesitamos solo 3 cosas: RUT, cámara de comercio vigente y foto del local. Con eso listos hoy, los tenemos activos en 48 horas. ¿Los tienen a mano ahora?`,
      };
    }
    // Positive / ready to close
    if (sent === 'Positivo' || lastText.includes('listo') || lastText.includes('dale') || lastText.includes('arrancamos')) {
      return {
        situacion: `🟢 ${aliado.name} está en modo cierre. Alta probabilidad de conversión. Actúa rápido antes de que pierdan el impulso.`,
        acciones: [
          { icon:'✍️', text:'Envía el contrato digital ahora mismo por correo' },
          { icon:'📅', text:'Agendarles la sesión de onboarding esta semana' },
          { icon:'🎉', text:'Confirma la fecha de activación y el beneficio de lanzamiento' },
        ],
        mensaje: `¡Excelente! Te envío el contrato ahora mismo al correo. Se firma en 5 minutos desde el celular. Una vez firmado los activamos en 48h y arrancamos con visibilidad premium el primer mes 🚀`,
      };
    }
    // Negative / hesitant
    if (sent === 'Negativo' || lastText.includes('tiempo') || lastText.includes('después') || lastText.includes('evaluar')) {
      return {
        situacion: `⚠️ ${aliado.name} está frenando. Riesgo de perder la oportunidad. Necesitas crear urgencia sin presionar.`,
        acciones: [
          { icon:'⏰', text:'Menciona que la oferta de lanzamiento tiene cupo limitado esta semana' },
          { icon:'🔍', text:'Identifica la objeción real — pregunta directamente qué los frena' },
          { icon:'📞', text:'Propón una llamada de 10 minutos para resolver todas las dudas' },
        ],
        mensaje: `Entiendo que necesitan tiempo. Solo quiero mencionarles que el beneficio de primer mes con comisión reducida al 12% lo tenemos disponible para los próximos 3 aliados que activen esta semana. ¿Qué les haría sentir más seguros para avanzar?`,
      };
    }
    // Default Inside Sales
    return {
      situacion: `Conversación activa con ${aliado.name}. Estado: ${status}. Mantén el foco en demostrar valor y avanzar al siguiente paso.`,
      acciones: [
        { icon:'📱', text:'Comparte un caso de éxito de un restaurante similar en su zona' },
        { icon:'🎯', text:'Pregunta por su mayor reto actual en ventas para conectar la solución' },
        { icon:'📅', text:'Propón un próximo paso concreto: llamada, visita o envío de contrato' },
      ],
      mensaje: `¡Hola! Quería contarles que un restaurante de ${aliado.category} en su zona activó hace 3 semanas y ya lleva $8M en ventas adicionales. ¿Les gustaría ver cómo lo lograron?`,
    };
  }

  if (role === 'Farmer Mass') {
    // Catalog issues
    if (aliado.clasificacion < 50) {
      return {
        situacion: `⚠️ El catálogo de ${aliado.name} tiene score ${aliado.clasificacion}/100. Esto los penaliza en el ranking. Prioridad alta: mejorar fotos y descripciones.`,

          { icon:'📸', text:'Ofrecer sesión fotográfica con el aliado fotógrafo ($120.000 - 10 platos)' },
          { icon:'✍️', text:'Redactar descripciones para los 3 platos más vendidos juntos ahora' },
          { icon:'🏷️', text:'Revisar que todos los precios estén actualizados en la app' },
        ],
        mensaje: `Revisé su tienda y vi que el catálogo puede mejorar bastante. Los platos con foto profesional + descripción tienen 47% más pedidos. ¿Les agendamos una sesión de mejora de catálogo esta semana?`,
      };
    }
    // Availability issues
    if (status === 'Inactivo' || lastText.includes('cerramos') || lastText.includes('cerrado') || lastText.includes('personal')) {
      return {
        situacion: `🔴 Problema de disponibilidad en ${aliado.name}. Los cierres inesperados afectan el ranking. Ayúdalos a configurar el modo ocupado.`,

          { icon:'⚙️', text:'Configurar "Modo ocupado" para limitar pedidos en vez de cerrar' },

      };
    }
    // Discount / acquisition opportunity
    if (sent === 'Positivo' && aliado.clientes > 400) {
      return {
        situacion: `🟢 ${aliado.name} tiene buen volumen (${aliado.clientes.toLocaleString()} clientes) y sentimiento positivo. Momento ideal para proponer campaña de captación.`,
        acciones: [
          { icon:'🎯', text:'Presentar campaña de descuento cofinanciado 50/50 con Rappi' },
          { icon:'🔄', text:'Activar campaña de reactivación para usuarios inactivos +30 días' },
          { icon:'🏅', text:'Proponer el badge "Destacado" si tienen +90% de uptime' },
        ],
        mensaje: `¡Hola! Con su base de ${aliado.clientes.toLocaleString()} clientes tienen un potencial enorme de reactivación. Rappi cofinancia el 50% de un descuento de reactivación — ustedes solo ponen el otro 50%. ¿Les interesa activar eso esta semana?`,
      };
    }
    // Toppings not configured
    return {
      situacion: `Aliado activo con oportunidad de mejora. Foco en maximizar ticket promedio y disponibilidad consistente.`,
      acciones: [
        { icon:'🍽️', text:'Verificar que todos los platos tienen toppings/modificadores configurados' },
        { icon:'🕐', text:'Confirmar que los horarios de delivery están correctos en la app' },
        { icon:'📈', text:'Revisar si hay productos populares en local que no están en la app' },
      ],
      mensaje: `¡Hola! Estoy revisando su tienda y vi que podrían aumentar el ticket promedio con toppings y modificadores en sus platos. Aliados similares tienen +22% de ticket con esa configuración. ¿Los ayudo a configurarlos?`,
    };
  }

  // Default / Brand Development
  return {
    situacion: `Conversación con ${aliado.name}. Analiza el contexto y prepara tu próximo mensaje.`,
    acciones: [
      { icon:'💬', text:'Revisa el historial para identificar el tono adecuado' },
      { icon:'🎯', text:'Define un objetivo claro para esta conversación' },
      { icon:'📋', text:'Consulta las plantillas disponibles para mensajes clave' },
    ],
    mensaje: `¡Hola! ¿Cómo están? Quería hacer un seguimiento y ver cómo podemos apoyarlos esta semana.`,
  };
};

/* ─── HOME VIEW ─── */
const HomeView = ({ aliados, currentUser, onOpenChat }) => {
  const now   = new Date();
  const hour  = now.getHours();
  const greeting = hour < 12 ? 'Buenos días' : hour < 18 ? 'Buenas tardes' : 'Buenas noches';
  const dateStr  = now.toLocaleDateString('es-CO', { weekday:'long', day:'numeric', month:'long' });
  const dateLabel = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);

  // ── KPI calculations ──
  // Asignados: aliados del agente según zona
  const asignados    = aliados.filter(a => currentUser.zone === 'Todas' || a.zone === currentUser.zone);
  const asignadosN   = asignados.length;

  // Sin Leer: conversaciones con mensajes no leídos
  const sinLeer      = aliados.filter(a => a.unread > 0).length;

  // Sin Responder: última msg es del aliado Y ya fue leída (unread===0) → agente no ha contestado
  const lastMsgFrom  = a => {
    const roleKey = currentUser.role === 'Farmer Mass' ? 'msgsFarmer' : 'msgs';
    const m = (a[roleKey] || a.msgs);
    return m.length > 0 ? m[m.length - 1].from : null;
  };
  const sinResponder = aliados.filter(a => a.unread === 0 && lastMsgFrom(a) === 'them').length;

  // Pendientes: última msg es del agente → aliado no ha respondido
  const pendientes   = aliados.filter(a => lastMsgFrom(a) === 'me').length;

  const total     = aliados.length;
  const positivos = aliados.filter(a => a.sentimiento === 'Positivo').length;
  const neutrales = aliados.filter(a => a.sentimiento === 'Neutral').length;
  const negativos = aliados.filter(a => a.sentimiento === 'Negativo').length;

  const pct = (n) => total > 0 ? Math.round((n/total)*100) : 0;

  // Sort: sin responder first → sin leer → pendientes → rest
  const sortedAliados = [...aliados].sort((a,b) => {
    const priority = x => {
      if (x.unread > 0) return 0;
      if (x.unread === 0 && lastMsgFrom(x) === 'them') return 1;
      if (lastMsgFrom(x) === 'me') return 2;
      return 3;
    };
    return priority(a) - priority(b);
  });

  const sentIcon  = s => s==='Positivo' ? '😊' : s==='Negativo' ? '😞' : '😐';
  const sentColor = s => s==='Positivo' ? '#16A34A' : s==='Negativo' ? '#DC2626' : '#D97706';

  return (
    <div className="flex flex-col h-full overflow-y-auto" style={{ background:'#F4F4F4' }}>

      {/* ── Header ── */}
      <div className="flex-shrink-0 px-5 pt-5 pb-4" style={{ background:'#FFFFFF', borderBottom:'1px solid #EDEDED' }}>
        <div className="flex items-center justify-between">
          <div>
            <p className="text-xs text-wa-text mb-0.5">{dateLabel}</p>
            <h2 style={{ fontFamily:'Poppins', fontWeight:700, fontSize:20, color:'#1A1A1A', lineHeight:1.2 }}>
              {greeting}, <span style={{ color:'#FF441F' }}>{currentUser.name.split(' ')[0]}</span> 👋
            </h2>
            <p className="text-xs text-wa-text mt-1">
              <span className="font-medium" style={{ color:'#1A1A1A' }}>{currentUser.role}</span> · {currentUser.email}
            </p>
          </div>
          <div className="w-12 h-12 rounded-full overflow-hidden flex-shrink-0" style={{ border:'2px solid #FF441F' }}>
            {currentUser.photo
              ? <img src={currentUser.photo} style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
              : <div style={{ width:'100%', height:'100%', background:currentUser.color, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, color:'#fff' }}>{currentUser.avatar}</div>
            }
          </div>
        </div>
      </div>

      <div className="px-4 py-4 flex flex-col gap-4">

        {/* ── KPI Cards ── */}
        <div className="grid grid-cols-2 gap-3">
          {[
            { label:'Asignados',      value:asignadosN,  color:'#1A1A1A', bg:'#FFFFFF',  icon:'🏪', desc:'Aliados asignados a ti' },
            { label:'Sin Leer',       value:sinLeer,     color:'#FF441F', bg:'#FFF0ED',  icon:'🔴', desc:'Mensajes no leídos' },
            { label:'Sin Responder',  value:sinResponder,color:'#7C3AED', bg:'#F5F3FF',  icon:'💬', desc:'Esperando tu respuesta' },
            { label:'Pendientes',     value:pendientes,  color:'#D97706', bg:'#FFFBEB',  icon:'⏳', desc:'Esperando respuesta del aliado' },
          ].map(c => (
            <div key={c.label} className="rounded-2xl p-4" style={{ background:c.bg, border:'1px solid #EDEDED' }}>
              <div className="flex items-center gap-2 mb-1">
                <span style={{ fontSize:20 }}>{c.icon}</span>
                <p style={{ fontFamily:'Poppins', fontWeight:800, fontSize:28, color:c.color, lineHeight:1 }}>{c.value}</p>
              </div>
              <p className="text-sm font-semibold" style={{ color:'#1A1A1A' }}>{c.label}</p>
              <p className="text-xs mt-0.5" style={{ color:'#AAAAAA' }}>{c.desc}</p>
            </div>
          ))}
        </div>

        {/* ── Sentiment Bar ── */}
        <div className="rounded-2xl p-4" style={{ background:'#FFFFFF', border:'1px solid #EDEDED' }}>
          <p className="text-xs font-bold mb-3" style={{ color:'#1A1A1A', textTransform:'uppercase', letterSpacing:0.5 }}>Sentimiento general</p>
          <div className="flex rounded-full overflow-hidden mb-3" style={{ height:10 }}>
            {positivos > 0 && <div style={{ width:`${pct(positivos)}%`, background:'#16A34A' }}/>}
            {neutrales > 0 && <div style={{ width:`${pct(neutrales)}%`, background:'#D97706' }}/>}
            {negativos > 0 && <div style={{ width:`${pct(negativos)}%`, background:'#DC2626' }}/>}
          </div>
          <div className="flex justify-between">
            {[['😊','Positivo',positivos,'#16A34A'],['😐','Neutral',neutrales,'#D97706'],['😞','Negativo',negativos,'#DC2626']].map(([icon,label,n,color])=>(
              <div key={label} className="flex items-center gap-1.5">
                <span style={{ fontSize:14 }}>{icon}</span>
                <div>
                  <p style={{ fontFamily:'Poppins', fontWeight:700, fontSize:15, color, lineHeight:1 }}>{n}</p>
                  <p style={{ fontSize:10, color:'#AAAAAA' }}>{label}</p>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* ── Conversation Feed ── */}
        <div className="rounded-2xl overflow-hidden" style={{ border:'1px solid #EDEDED' }}>
          <div className="px-4 py-3 flex items-center justify-between" style={{ background:'#FFFFFF', borderBottom:'1px solid #EDEDED' }}>
            <p className="text-xs font-bold" style={{ color:'#1A1A1A', textTransform:'uppercase', letterSpacing:0.5 }}>Conversaciones</p>
            <span className="text-xs text-wa-text">{total} aliados</span>
          </div>
          {sortedAliados.map((a, idx) => (
            <div key={a.id}
                 onClick={() => onOpenChat(a)}
                 className="flex items-center gap-3 px-4 py-3 cursor-pointer transition-colors hover:bg-wa-hover"
                 style={{ background:'#FFFFFF', borderBottom: idx < sortedAliados.length-1 ? '1px solid #F4F4F4' : 'none' }}>
              {/* Avatar */}
              <div className="relative flex-shrink-0">
                <div style={{ width:42, height:42, borderRadius:'50%', background:a.color, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, color:'#fff', fontSize:14 }}>{a.avatar}</div>
                <span style={{ position:'absolute', bottom:0, right:0, fontSize:12, lineHeight:1 }}>{sentIcon(a.sentimiento)}</span>
              </div>
              {/* Info */}
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-0.5">
                  <span className="font-semibold text-sm text-gray-900 truncate">{a.name}</span>
                </div>
                <p className="text-xs text-wa-text truncate">{a.lastMsg}</p>
                <p className="text-xs mt-0.5" style={{ color:'#CCCCCC' }}>{a.category} · {a.zone} · {a.lastTime}</p>
              </div>
              {/* Right */}
              <div className="flex flex-col items-end gap-1.5 flex-shrink-0">
                {a.unread > 0
                  ? <span className="px-2 py-0.5 rounded-full text-xs font-bold text-white" style={{ background:'#FF441F' }}>Sin leer {a.unread}</span>
                  : lastMsgFrom(a) === 'them'
                    ? <span className="px-2 py-0.5 rounded-full text-xs font-semibold" style={{ background:'#F5F3FF', color:'#7C3AED' }}>Sin responder</span>
                    : lastMsgFrom(a) === 'me'
                      ? <span className="px-2 py-0.5 rounded-full text-xs font-semibold" style={{ background:'#FFFBEB', color:'#D97706' }}>Pendiente</span>
                      : <span style={{ fontSize:16 }}>{sentIcon(a.sentimiento)}</span>
                }
                <span style={{ fontSize:13 }}>{sentIcon(a.sentimiento)}</span>
              </div>
            </div>
          ))}
        </div>

      </div>
    </div>
  );
};

/* ─── CONTACTS VIEW ─── */
const ContactsView = ({ aliados, onOpenChat }) => {
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('Todos');
  const [zoneFilter, setZoneFilter] = useState('Todas');
  const [statusFilter, setStatusFilter] = useState('Todos');
  const [showFilters, setShowFilters] = useState(false);
  const [selected, setSelected] = useState(null);

  const filtered = aliados.filter(a => {
    const q = search.toLowerCase();
    return (
      (a.name.toLowerCase().includes(q) || a.phone.includes(q)) &&
      (catFilter === 'Todos' || a.category === catFilter) &&
      (zoneFilter === 'Todas' || a.zone === zoneFilter) &&
      (statusFilter === 'Todos' || a.status === statusFilter)
    );
  });

  const stats = {
    total: aliados.length,
    activos: aliados.filter(a => a.status === 'Activo').length,
    pendientes: aliados.filter(a => a.status === 'Pendiente').length,
    inactivos: aliados.filter(a => a.status === 'Inactivo').length,
  };

  return (
    <div className="flex flex-col h-full overflow-hidden" style={{ background:'#F4F4F4' }}>
      {/* Header */}
      <div className="flex-shrink-0 px-4 py-4" style={{ background:'#FFFFFF', borderBottom:'1px solid #EDEDED' }}>
        <div className="flex justify-between items-center mb-3">
          <h2 className="font-bold text-gray-900 text-lg">Aliados</h2>
          <button className="p-2 hover:bg-black/5 rounded-full transition-colors">
            <Icon path={IC.plus} size={20} color="#777777"/>
          </button>
        </div>
        {/* Stats */}
        <div className="grid grid-cols-4 gap-2 mb-3">
          {[
            { label:'Total', value: stats.total, color:'text-gray-900' },
            { label:'Activos', value: stats.activos, color:'text-green-400' },
            { label:'Pendientes', value: stats.pendientes, color:'text-amber-400' },
            { label:'Inactivos', value: stats.inactivos, color:'text-gray-400' },
          ].map(s => (
            <div key={s.label} className="rounded-lg p-2 text-center" style={{ background:'#F4F4F4' }}>
              <p className={`font-bold text-lg ${s.color}`}>{s.value}</p>
              <p className="text-wa-text text-xs">{s.label}</p>
            </div>
          ))}
        </div>
        {/* Search */}
        <div className="flex gap-2">
          <div className="flex-1 flex items-center gap-2 rounded-lg px-3 py-2" style={{ background:'#F4F4F4' }}>
            <Icon path={IC.search} size={16} color="#AAAAAA"/>
            <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                   placeholder="Buscar aliado…"
                   className="flex-1 bg-transparent text-sm text-gray-900 placeholder-wa-text"
                   style={{ border:'none', outline:'none' }}/>

               onClick={() => { setSelected(selected===a.id ? null : a.id); }}
               className={`flex items-center gap-3 px-4 py-3 cursor-pointer transition-colors ${selected===a.id ? 'bg-wa-hover' : 'hover:bg-wa-hover'}`}
               style={{ borderBottom:'1px solid #EDEDED' }}>

            <div className="flex-1 min-w-0">

                    title="Abrir chat">
              <Icon path={IC.chat} size={18} color="#777777"/>
            </button>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ─── BROADCAST VIEW ─── */
const BroadcastView = ({ aliados }) => {
  const [selected, setSelected] = useState([]);
  const [message, setMessage] = useState('');
  const [sent, setSent] = useState(false);
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('Todos');

  const filtered = aliados.filter(a => {
    const q = search.toLowerCase();
    return a.name.toLowerCase().includes(q) && (catFilter==='Todos' || a.category===catFilter);
  });

  const toggle = (id) => setSelected(s => s.includes(id) ? s.filter(x=>x!==id) : [...s, id]);
  const selectAll = () => setSelected(filtered.map(a => a.id));
  const clearAll = () => setSelected([]);

  const sendBroadcast = () => {
    if (!message.trim() || selected.length === 0) return;
    setSent(true);
    setTimeout(() => { setSent(false); setMessage(''); setSelected([]); }, 3000);
  };

  return (
    <div className="flex flex-col h-full overflow-hidden" style={{ background:'#F4F4F4' }}>
      <div className="flex-shrink-0 px-4 py-4" style={{ background:'#FFFFFF', borderBottom:'1px solid #EDEDED' }}>
        <h2 className="font-bold text-gray-900 text-lg mb-1">Difusión Masiva</h2>
        <p className="text-wa-text text-xs">Envía un mensaje a múltiples aliados a la vez</p>
        <div className="flex gap-2 mt-3">
          <div className="flex-1 flex items-center gap-2 rounded-lg px-3 py-2" style={{ background:'#F4F4F4' }}>
            <Icon path={IC.search} size={16} color="#AAAAAA"/>
            <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                   placeholder="Buscar aliado…" className="flex-1 bg-transparent text-sm text-gray-900 placeholder-wa-text" style={{ border:'none', outline:'none' }}/>
          </div>
        </div>
        <div className="flex flex-wrap gap-1.5 mt-2">
          {CATEGORIES.map(c => (
            <button key={c} onClick={() => setCatFilter(c)}
                    className="px-2.5 py-1 rounded-full text-xs font-medium transition-colors"
                    style={{ background: catFilter===c ? '#FF441F' : '#F4F4F4', color: catFilter===c ? '#fff' : '#AAAAAA' }}>{c}</button>
          ))}
        </div>
        <div className="flex justify-between items-center mt-3">
          <span className="text-wa-text text-xs">{selected.length} seleccionados de {filtered.length}</span>
          <div className="flex gap-2">
            <button onClick={selectAll} className="text-xs text-wa-green hover:underline">Todos</button>
            <button onClick={clearAll} className="text-xs text-wa-text hover:text-gray-900">Limpiar</button>
          </div>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto">
        {filtered.map(a => (
          <div key={a.id} onClick={() => toggle(a.id)}
               className="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-wa-hover transition-colors"
               style={{ borderBottom:'1px solid #EDEDED' }}>
            <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-colors ${selected.includes(a.id) ? 'bg-wa-green border-wa-green' : 'border-wa-icon'}`}>
              {selected.includes(a.id) && <Icon path={IC.check2} size={11} color="#fff"/>}
            </div>
            <Avatar label={a.avatar} color={a.color} size={38} online={a.status==='Activo'}/>
            <div className="flex-1 min-w-0">
              <p className="text-gray-900 text-sm font-medium truncate">{a.name}</p>
              <p className="text-wa-text text-xs">{a.category} · {a.zone}</p>
            </div>
            <span className={`px-2 py-0.5 rounded-full text-xs ${STATUS_BG[a.status]}`}>{a.status}</span>
          </div>
        ))}
      </div>

      {/* Message composer */}
      <div className="flex-shrink-0 px-4 py-4" style={{ background:'#FFFFFF', borderTop:'1px solid #EDEDED' }}>
        {sent ? (
          <div className="text-center py-2 fade-in">
            <p className="text-wa-green font-semibold text-sm">✓ Mensaje enviado a {selected.length} aliados</p>
          </div>
        ) : (
          <>
            <div className="mb-2">
              <p className="text-wa-text text-xs mb-1">Plantillas rápidas</p>
              <div className="flex gap-1.5 overflow-x-auto pb-1">
                {TEMPLATES.map(t => (
                  <button key={t.id} onClick={() => setMessage(t.text)}
                          className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs text-wa-text hover:text-gray-900 transition-colors"
                          style={{ background:'#F4F4F4', whiteSpace:'nowrap' }}>{t.name}</button>
                ))}
              </div>
            </div>
            <textarea value={message} onChange={e => setMessage(e.target.value)}
                      placeholder="Escribe tu mensaje de difusión…" rows={3}
                      className="w-full rounded-lg px-3 py-2 text-sm text-gray-900 placeholder-wa-text resize-none"
                      style={{ background:'#F4F4F4', border:'none', outline:'none' }}/>
            <button onClick={sendBroadcast}
                    disabled={!message.trim() || selected.length === 0}
                    className="mt-2 w-full py-2.5 rounded-lg font-semibold text-sm transition-all"
                    style={{ background: (!message.trim() || selected.length===0) ? '#F4F4F4' : '#FF441F', color: (!message.trim() || selected.length===0) ? '#4A5568' : '#fff' }}>
              {selected.length === 0 ? 'Selecciona aliados primero' : `Enviar a ${selected.length} aliado${selected.length>1?'s':''}`}
            </button>
          </>
        )}
      </div>
    </div>
  );
};

/* ─── TEMPLATES VIEW ─── */
const TemplatesView = () => {
  const [templates, setTemplates] = useState(TEMPLATES);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name:'', text:'' });

  const save = () => {
    if (!form.name.trim() || !form.text.trim()) return;
    if (editing === 'new') {
      setTemplates(t => [...t, { id: Date.now(), ...form }]);
    } else {
      setTemplates(t => t.map(x => x.id===editing ? { ...x, ...form } : x));
    }
    setEditing(null);
    setForm({ name:'', text:'' });
  };

  return (
    <div className="flex flex-col h-full overflow-hidden" style={{ background:'#F4F4F4' }}>
      <div className="flex-shrink-0 px-4 py-4 flex justify-between items-center" style={{ background:'#FFFFFF', borderBottom:'1px solid #EDEDED' }}>
        <div>
          <h2 className="font-bold text-gray-900 text-lg">Plantillas</h2>
          <p className="text-wa-text text-xs">{templates.length} plantillas guardadas</p>
        </div>
        <button onClick={() => { setEditing('new'); setForm({ name:'', text:'' }); }}
                className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors"
                style={{ background:'#FF441F', color:'#fff' }}>
          <Icon path={IC.plus} size={16} color="#fff"/>Nueva
        </button>
      </div>

      {editing && (
        <div className="flex-shrink-0 px-4 py-4 fade-in" style={{ background:'#F4F4F4', borderBottom:'1px solid #EDEDED' }}>
          <p className="text-gray-900 font-medium text-sm mb-3">{editing==='new' ? 'Nueva plantilla' : 'Editar plantilla'}</p>
          <input type="text" value={form.name} onChange={e => setForm(f => ({...f, name:e.target.value}))}
                 placeholder="Nombre de la plantilla" className="w-full rounded-lg px-3 py-2 text-sm text-gray-900 placeholder-wa-text mb-2"
                 style={{ background:'#F4F4F4', border:'none', outline:'none' }}/>
          <textarea value={form.text} onChange={e => setForm(f => ({...f, text:e.target.value}))}
                    placeholder="Texto del mensaje. Usa {{variable}} para campos dinámicos." rows={4}
                    className="w-full rounded-lg px-3 py-2 text-sm text-gray-900 placeholder-wa-text resize-none"
                    style={{ background:'#F4F4F4', border:'none', outline:'none' }}/>
          <p className="text-wa-text text-xs mt-1 mb-3">Variables: {'{{nombre}}'} {'{{agente}}'} {'{{fecha}}'} {'{{hora}}'} {'{{mes}}'}</p>
          <div className="flex gap-2">
            <button onClick={save} className="flex-1 py-2 rounded-lg text-sm font-semibold" style={{ background:'#FF441F', color:'#fff' }}>Guardar</button>
            <button onClick={() => { setEditing(null); setForm({name:'',text:''}); }}
                    className="flex-1 py-2 rounded-lg text-sm font-semibold text-wa-text hover:text-gray-900 transition-colors" style={{ background:'#F4F4F4' }}>Cancelar</button>
          </div>
        </div>
      )}

      <div className="flex-1 overflow-y-auto">
        {templates.map(t => (
          <div key={t.id} className="px-4 py-3 hover:bg-wa-hover transition-colors" style={{ borderBottom:'1px solid #EDEDED' }}>
            <div className="flex justify-between items-start gap-2">
              <div className="flex-1 min-w-0">
                <p className="text-gray-900 font-medium text-sm">{t.name}</p>
                <p className="text-wa-text text-xs mt-1 leading-relaxed">{t.text}</p>
              </div>
              <div className="flex gap-1 flex-shrink-0">
                <button onClick={() => { setEditing(t.id); setForm({ name:t.name, text:t.text }); }}
                        className="p-1.5 hover:bg-black/5 rounded-full transition-colors text-wa-text hover:text-gray-900 text-xs px-2">
                  Editar
                </button>
                <button onClick={() => setTemplates(ts => ts.filter(x => x.id !== t.id))}
                        className="p-1.5 hover:bg-red-500/20 rounded-full transition-colors text-wa-text hover:text-red-400 text-xs px-2">
                  Eliminar
                </button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ─── LOGIN SCREEN ─── */
function LoginScreen({ onLogin }) {
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [showPass, setShowPass] = useState(false);
  const [error, setError]       = useState('');
  const [loading, setLoading]   = useState(false);

  const submit = (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    setTimeout(() => {
      const user = USERS.find(u => u.email === email.trim().toLowerCase() && u.password === password);
      if (user) {
        onLogin(user);
      } else {
        setError('Correo o contraseña incorrectos.');
        setLoading(false);
      }
    }, 800);
  };

  const quickLogin = (user) => {
    setEmail(user.email);
    setPassword(user.password);
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4" style={{ background:'#F9F5F3' }}>
      <div className="w-full max-w-sm fade-in">
        {/* Logo */}
        <div className="flex flex-col items-center mb-8">
          <div className="w-20 h-20 rounded-3xl flex items-center justify-center mb-4 shadow-xl" style={{ background:'#FFFFFF' }}>
            <img src="moustache-orange.png" alt="Rappi" style={{ width:56, height:'auto' }}/>
          </div>
          <div className="flex items-center mb-1">
            <span style={{ fontFamily:'Poppins', fontWeight:800, fontSize:26, color:'#FF441F', letterSpacing:-0.5 }}>Rappi</span><span style={{ fontFamily:'Poppins', fontWeight:300, fontSize:26, color:'#1A1A1A', letterSpacing:-0.5 }}>Orbit</span>
          </div>
          <p className="text-wa-text text-sm mt-0.5">Plataforma de comunicación</p>
        </div>

        {/* Card */}
        <div className="rounded-2xl p-6 shadow-2xl" style={{ background:'#FFFFFF', border:'1px solid #EDEDED' }}>
          <form onSubmit={submit} className="space-y-4">
            <div>
              <label className="block text-xs font-medium text-wa-text mb-1.5">Correo electrónico</label>
              <input
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}
                placeholder="tu@empresa.com"
                required
                autoComplete="email"
                className="w-full rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-wa-text transition-colors"
                style={{ background:'#F4F4F4', border:'1px solid #D1D7DB', outline:'none' }}
                onFocus={e => e.target.style.borderColor='#FF441F'}
                onBlur={e => e.target.style.borderColor='#D1D7DB'}
              />
            </div>
            <div>
              <label className="block text-xs font-medium text-wa-text mb-1.5">Contraseña</label>
              <div className="relative">
                <input
                  type={showPass ? 'text' : 'password'}
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  placeholder="••••••••"
                  required
                  autoComplete="current-password"
                  className="w-full rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-wa-text transition-colors pr-11"
                  style={{ background:'#F4F4F4', border:'1px solid #D1D7DB', outline:'none' }}
                  onFocus={e => e.target.style.borderColor='#FF441F'}
                  onBlur={e => e.target.style.borderColor='#D1D7DB'}
                />
                <button type="button" onClick={() => setShowPass(s => !s)}
                        className="absolute right-3 top-1/2 -translate-y-1/2 text-wa-text hover:text-gray-900 transition-colors">
                  {showPass
                    ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  }
                </button>
              </div>
            </div>

            {error && (
              <p className="text-red-400 text-xs text-center py-1 px-3 rounded-lg fade-in" style={{ background:'#FEF2F2' }}>{error}</p>
            )}

            <button type="submit" disabled={loading}
                    className="w-full py-3 rounded-xl font-semibold text-sm transition-all mt-2"
                    style={{ background: loading ? '#DDDDDD' : '#FF441F', color: loading ? '#AAAAAA' : '#fff' }}>
              {loading ? (
                <span className="flex items-center justify-center gap-2">
                  <svg className="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                  </svg>
                  Iniciando sesión…
                </span>
              ) : 'Iniciar sesión'}
            </button>
          </form>
        </div>

        {/* Demo accounts */}
        <div className="mt-5">
          <p className="text-center text-xs text-wa-text mb-3">— Cuentas de demostración —</p>
          <div className="space-y-2">
            {USERS.map(u => (
              <button key={u.id} onClick={() => quickLogin(u)}
                      className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-colors text-left hover:bg-black/5"
                      style={{ background:'#F9FAFB', border:'1px solid #EDEDED' }}>
                <Avatar label={u.avatar} color={u.color} size={32} photo={u.photo||null}/>
                <div className="flex-1 min-w-0">
                  <p className="text-xs font-medium" style={{ color: u.color }}>{u.name}</p>
                  <p className="text-wa-text text-xs">{u.email}</p>
                </div>
                <span className="text-xs px-2 py-0.5 rounded-full flex-shrink-0"
                      style={{
                        background: u.role==='Inside Sales' ? '#7C3AED22' : u.role==='Farmer Mass' ? '#0891B222' : '#E11D4822',
                        color:      u.role==='Inside Sales' ? '#7C3AED'   : u.role==='Farmer Mass' ? '#0891B2'   : '#E11D48'
                      }}>
                  {u.role}
                </span>
              </button>
            ))}
          </div>
          <p className="text-center text-xs mt-3" style={{ color:'#555555' }}>Contraseña de demo: <span style={{ color:'#888888' }}>123456</span></p>
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN APP ─── */
function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [aliados, setAliados] = useState(initialAliados);
  const [activeSection, setActiveSection] = useState('home');  // home | chats | contacts | templates
  const [activeChat, setActiveChat] = useState(null);
  const [searchChat, setSearchChat] = useState('');
  const [showMobileChat, setShowMobileChat] = useState(false);
  const [chatTab, setChatTab] = useState('asignados');   // asignados | activos
  const [chatZone, setChatZone] = useState('Todos');

  if (!currentUser) return <LoginScreen onLogin={setCurrentUser}/>;

  const perms = ROLE_CONFIG[currentUser.role] || ROLE_CONFIG['Inside Sales'];

  const openChat = (aliado) => {
    setActiveChat(aliado);
    setActiveSection('chats');
    setShowMobileChat(true);
    // Clear unread
    setAliados(prev => prev.map(a => a.id === aliado.id ? { ...a, unread:0 } : a));
  };

  const sendMessage = (aliadoId, text) => {
    const now = new Date();
    const time = now.toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' });
    const newMsg = { id: Date.now(), from:'me', text, time };
    setAliados(prev => prev.map(a =>
      a.id === aliadoId
        ? { ...a, msgs:[...a.msgs, newMsg], lastMsg: text, lastTime: time }
        : a
    ));
    setActiveChat(prev => prev?.id === aliadoId ? { ...prev, msgs:[...prev.msgs, newMsg], lastMsg:text, lastTime:time } : prev);
  };

  const sortedChats = [...aliados].sort((a,b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return 0;
  });

  const filteredChats = sortedChats.filter(a =>
    a.name.toLowerCase().includes(searchChat.toLowerCase()) ||
    a.lastMsg.toLowerCase().includes(searchChat.toLowerCase())
  );

  const totalUnread = aliados.reduce((s,a) => s + a.unread, 0);

  const navItems = [
    { id:'home',      icon: IC.home,      label:'Inicio',    badge: 0 },
    { id:'chats',     icon: IC.chat,      label:'Chats',     badge: totalUnread },
    { id:'contacts',  icon: IC.contacts,  label:'Aliados',   badge: 0 },
    { id:'templates', icon: IC.template,  label:'Plantillas',badge: 0 },
  ].filter(n => n.id === 'home' || perms.navSections.includes(n.id));

  return (
    <div className="flex h-screen overflow-hidden" style={{ background:'#F4F4F4' }}>

      {/* ── Sidebar nav (icon strip) ── */}
      <div className="flex flex-col items-center py-4 gap-1 flex-shrink-0" style={{ width:60, background:'#FFFFFF', borderRight:'1px solid #EDEDED' }}>
        {/* Logo Rappi Orbit */}
        <div className="w-9 h-9 rounded-xl flex items-center justify-center mb-3" style={{ background:'#FFFFFF', border:'1px solid #EDEDED' }}>
          <img src="moustache-orange.png" alt="Rappi" style={{ width:26, height:'auto' }}/>
        </div>
        {navItems.map(n => (
          <button key={n.id} onClick={() => { setActiveSection(n.id); if(n.id!=='chats') setShowMobileChat(false); }}
                  className="relative w-10 h-10 rounded-xl flex items-center justify-center transition-colors group"
                  style={{ background: activeSection===n.id ? '#FFF0ED' : 'transparent' }}
                  title={n.label}>
            <Icon path={n.icon} size={20} color={activeSection===n.id ? '#FF441F' : '#AAAAAA'}/>
            {n.badge > 0 && (
              <span className="absolute -top-0.5 -right-0.5 w-4 h-4 rounded-full text-white text-xs flex items-center justify-center font-bold rappi-gradient" style={{ fontSize:9 }}>{n.badge}</span>
            )}
          </button>
        ))}
        <div className="flex-1"/>
        <button className="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-wa-hover transition-colors" title="Configuración">
          <Icon path={IC.settings} size={20} color="#AAAAAA"/>
        </button>
        <div title={currentUser.name}>
          <Avatar label={currentUser.avatar} color={currentUser.color} size={32} photo={currentUser.photo||null}/>
        </div>
      </div>

      {/* ── Left panel (hidden on home) ── */}
      <div className={`flex-shrink-0 flex flex-col ${activeSection==='home' ? 'hidden' : (showMobileChat ? 'hidden md:flex' : 'flex')}`}
           style={{ width: 'clamp(280px, 30%, 380px)', borderRight:'1px solid #EDEDED' }}>

        {activeSection === 'chats' && (() => {
          // Tab filtering logic
          const byTab = aliados.filter(a => {
            if (chatTab === 'asignados') return a.zone === currentUser.zone || currentUser.zone === 'Todas';
            if (chatTab === 'activos')   return a.status === 'Activo';
            return true;
          });
          const byZone = chatZone === 'Todos' ? byTab : byTab.filter(a => a.zone === chatZone);
          const visibleChats = byZone.filter(a =>
            a.name.toLowerCase().includes(searchChat.toLowerCase()) ||
            a.lastMsg.toLowerCase().includes(searchChat.toLowerCase())
          );
          const counts = {
            asignados: aliados.filter(a => a.zone === currentUser.zone || currentUser.zone === 'Todas').length,
            activos:   aliados.filter(a => a.status === 'Activo').length,
          };
          return (
            <>
              {/* Header */}
              <div className="flex-shrink-0" style={{ background:'#FFFFFF', borderBottom:'1px solid #EDEDED' }}>
                {/* Top row */}
                <div className="flex items-center gap-3 px-4 pt-4 pb-3">
                  <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style={{ background:'#FFFFFF', border:'1px solid #EDEDED' }}>
                    <img src="moustache-orange.png" alt="Rappi" style={{ width:26, height:'auto' }}/>
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="font-bold text-sm leading-tight" style={{ fontFamily:'Poppins' }}>
                      <span style={{ color:'#FF441F' }}>Rappi</span><span style={{ color:'#1A1A1A', fontWeight:300 }}>Orbit</span>
                    </p>
                    <p className="text-wa-text text-xs truncate">{currentUser.email.split('@')[0]}</p>
                  </div>
                  <button onClick={() => setCurrentUser(null)} className="p-1.5 hover:bg-black/5 rounded-full transition-colors flex-shrink-0" title="Cerrar sesión">
                    <Icon path={IC.close} size={16} color="#AAAAAA"/>
                  </button>
                </div>

                {/* Search */}
                <div className="px-4 pb-3">
                  <div className="flex items-center gap-2 rounded-lg px-3 py-2" style={{ background:'#F4F4F4' }}>
                    <Icon path={IC.search} size={15} color="#AAAAAA"/>
                    <input type="text" value={searchChat} onChange={e => setSearchChat(e.target.value)}
                           placeholder="Buscar aliado…"
                           className="flex-1 bg-transparent text-sm text-gray-900 placeholder-wa-text"
                           style={{ border:'none', outline:'none' }}/>
                  </div>
                </div>

                {/* + Nuevo Mensaje button */}
                {perms.canNewMessage && (
                <div className="px-4 pb-3">
                  <button className="w-full py-2.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 transition-opacity hover:opacity-90"
                          style={{ background:'#FF441F', color:'#fff' }}>
                    <Icon path={IC.plus} size={16} color="#fff"/>
                    Nuevo Mensaje
                  </button>
                </div>
                )}

                {/* Tabs */}
                <div className="flex" style={{ borderTop:'1px solid #EDEDED' }}>
                  {[
                    { id:'asignados', label:'Asignados' },
                    { id:'activos',   label:'Activos'   },
                  ].filter(t => perms.tabs.includes(t.id)).map(t => (
                    <button key={t.id} onClick={() => setChatTab(t.id)}
                            className={`flex-1 py-3 text-xs font-semibold transition-colors relative ${chatTab===t.id ? 'text-wa-green' : 'text-wa-text hover:text-gray-900'}`}>
                      {t.label}
                      <span className={`ml-1 text-xs ${chatTab===t.id ? 'text-wa-green' : 'text-wa-text'}`}>({counts[t.id]})</span>
                      {chatTab===t.id && <span className="absolute bottom-0 left-0 right-0 h-0.5 bg-wa-green"/>}
                    </button>
                  ))}
                </div>

                {/* Zone filter */}
                {perms.canZoneFilter && (
                <div className="px-4 py-2.5" style={{ borderTop:'1px solid #EDEDED' }}>
                  <p className="text-wa-text text-xs font-semibold uppercase tracking-wider mb-1.5">Zona</p>
                  <select value={chatZone} onChange={e => setChatZone(e.target.value)}
                          className="w-full rounded-lg px-3 py-2 text-sm text-gray-900 appearance-none cursor-pointer"
                          style={{ background:'#F4F4F4', border:'1px solid #D1D7DB', outline:'none' }}>
                    {(perms.canViewAllZones ? ZONES : ['Todos', currentUser.zone]).map(z => <option key={z} value={z}>{z}</option>)}
                  </select>
                </div>
                )}
              </div>

              {/* Chat list */}
              <div className="flex-1 overflow-y-auto">
                {visibleChats.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-40 text-wa-text">
                    <Icon path={IC.chat} size={32} color="#C1C9D0"/>
                    <p className="mt-2 text-sm">Sin resultados</p>
                  </div>
                ) : visibleChats.map(a => (
                  <div key={a.id} onClick={() => openChat(a)}
                       className={`px-4 py-3 cursor-pointer transition-colors ${activeChat?.id===a.id ? 'bg-wa-hover' : 'hover:bg-wa-hover'}`}
                       style={{ borderBottom:'1px solid #EDEDED' }}>
                    <div className="flex items-start gap-3">
                      <Avatar label={a.avatar} color={a.color} size={42} online={a.status==='Activo'}/>
                      <div className="flex-1 min-w-0">
                        <div className="flex justify-between items-baseline mb-0.5">
                          <p className="font-semibold text-gray-900 text-sm truncate">{a.name}</p>
                          <span className={`text-xs ml-2 flex-shrink-0 ${a.unread>0 ? 'text-wa-green' : 'text-wa-text'}`}>{a.lastTime}</span>
                        </div>
                        <p className="text-wa-text text-xs truncate mb-1.5">{a.lastMsg}</p>
                        <div className="flex items-center gap-2">
                          <span className="text-xs px-2 py-0.5 rounded-full border font-medium"
                                style={{ borderColor:'#D97706', color:'#D97706', background:'#D9770610' }}>
                            enviado
                          </span>
                          {a.unread > 0 && (
                            <span className="w-4 h-4 rounded-full bg-wa-green text-gray-900 text-xs flex items-center justify-center font-bold" style={{ fontSize:9 }}>{a.unread}</span>
                          )}
                          {a.pinned && <Icon path={IC.pin} size={11} color="#AAAAAA"/>}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </>
          );
        })()}

        {activeSection === 'contacts'  && <ContactsView aliados={aliados} onOpenChat={openChat}/>}
        {activeSection === 'templates' && <TemplatesView/>}
      </div>

      {/* ── Right panel (chat / home) ── */}
      <div className={`flex-1 flex flex-col ${activeSection!=='home' && !showMobileChat ? 'hidden md:flex' : 'flex'}`}>
        {activeSection === 'home' ? (
          <HomeView aliados={aliados} currentUser={currentUser} onOpenChat={(a) => { openChat(a); setActiveSection('chats'); }}/>
        ) : activeChat ? (
          <ChatPanel
            aliado={aliados.find(a => a.id === activeChat.id) || activeChat}
            onBack={() => setShowMobileChat(false)}
            onSend={sendMessage}
            perms={perms}
            role={currentUser.role}
          />
        ) : (
          <div className="flex-1 flex flex-col items-center justify-center chat-bg">
            <div className="w-24 h-24 rounded-3xl flex items-center justify-center mb-6 shadow-lg" style={{ background:'#FFFFFF' }}>
              <img src="moustache-orange.png" alt="Rappi" style={{ width:70, height:'auto' }}/>
            </div>
            <h3 className="text-2xl font-bold mb-1" style={{ fontFamily:'Poppins' }}>
              <span style={{ color:'#FF441F' }}>Rappi</span><span style={{ color:'#1A1A1A', fontWeight:300 }}>Orbit</span>
            </h3>
            <p className="text-wa-text text-sm text-center max-w-xs mb-6">Selecciona un aliado para comenzar a chatear.</p>
            <div className="flex gap-4 text-center">
              {[
                { value: aliados.length, label:'Aliados totales', color:'#FF441F' },
                { value: aliados.filter(a=>a.status==='Activo').length, label:'Activos', color:'#34C85A' },
                { value: aliados.reduce((s,a)=>s+a.unread,0), label:'Sin leer', color:'#FBDC25' },
              ].map(s => (
                <div key={s.label} className="rounded-2xl px-5 py-4 shadow-sm" style={{ background:'#FFFFFF' }}>
                  <p className="text-3xl font-bold" style={{ color:s.color, fontFamily:'Poppins' }}>{s.value}</p>
                  <p className="text-wa-text text-xs mt-1">{s.label}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
